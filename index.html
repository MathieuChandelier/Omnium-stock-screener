<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnium — Modèle d'investissement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&amp;family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">
<style>
:root {
  --navy:#000190; --navy-dark:#00004a; --navy-light:#eeeffe;
  --teal:#2BD8C2; --teal-light:#e6faf8; --teal-text:#0F6E76; /* turquoise assombri (B>G, meme famille que --teal) : contraste 5.98:1 sur blanc, teal brut reserve aux fonds/bordures */
  --gold:#FFD700; --gold-light:#fffce6;
  --bg:#f0f2f8; --surface:#fff; --border:#e2e8f0;
  --text:#0d0d1a; --muted:#64748b;
  --proj-bg:#f7f9ff;
  --ok:#10b981; --err:#ef4444; --gold-text:#92700a;
  /* Echelle typo : appliquee aux classes CSS statiques ci-dessous ; les tailles
     generees en JS (return-block, badges dynamiques) restent en dur pour ne pas
     multiplier les points de regression a chaque ajustement. */
  --text-xs:11px; --text-sm:12px; --text-base:14px; --text-lg:16px; --text-2xl:28px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Quattrocento Sans',Georgia,serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;}
h1,h2,.tab,.kpi-value,.card-title,.step-title,.btn,.badge,.kpi-label,.adj-label,th{font-family:'Poppins',system-ui,sans-serif;}

/* ── HEADER ── */
header{background:#fff;color:var(--navy);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--teal);}
.h-tagline{display:flex;align-items:center;gap:7px;margin-top:1px;margin-left:1px;}
.h-tagline i{width:6px;height:6px;border-radius:50%;background:var(--teal);flex:0 0 auto;}
.h-tagline span{font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--navy);opacity:.62;font-family:'Poppins',sans-serif;}
.h-logo{height:34px;width:auto;display:block;}

/* ── TABS ── */
.tab-bar{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 75%,var(--navy-dark) 100%);display:flex;align-items:center;padding:11px 24px;gap:8px;}
.tab{display:inline-flex;align-items:center;gap:9px;padding:8px 20px 8px 10px;cursor:pointer;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:rgba(255,255,255,.88);border-radius:22px;font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;transition:background .15s,color .15s,border-color .15s,transform .12s,box-shadow .15s;box-shadow:0 1px 2px rgba(0,0,0,.12);}
.tab.active{background:linear-gradient(160deg,#39e6d0,var(--teal) 65%);border-color:var(--teal);color:var(--navy);box-shadow:0 2px 8px rgba(43,216,194,.35),inset 0 1px 0 rgba(255,255,255,.5);}
.tab:hover:not(.active){background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3);color:#fff;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.18);}
.tab:active{transform:scale(.96);}
.tab-back-arrow{display:inline-flex;font-size:13px;transition:opacity .15s;}
.tab-icon{display:inline-flex;align-items:center;transition:opacity .15s;opacity:.92;}
.tab:hover:not(.active) .tab-icon{opacity:1;}
.panel{display:none;}.panel.active{display:block;}

/* ── LAYOUT ── */
.container{max-width:1160px;margin:0 auto;padding:22px 24px;}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:12px;box-shadow:0 2px 14px rgba(0,1,144,.06),0 1px 3px rgba(0,0,0,.04);padding:20px 24px;margin-bottom:18px;}
.card-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px;}
.card-title b{color:var(--navy);}

/* ── KPI ── */
.pf-header{display:flex;align-items:baseline;gap:8px;margin-bottom:18px;}
.pf-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.10em;font-family:'Poppins',sans-serif;}
.pf-count{font-size:11px;color:var(--muted);font-family:'Quattrocento Sans',serif;}
.pf-list{display:flex;flex-direction:column;gap:0;background:var(--surface);border-radius:14px;box-shadow:0 2px 14px rgba(0,1,144,.07),0 1px 3px rgba(0,0,0,.04);overflow:hidden;border:1px solid rgba(0,1,144,.05);}
.pf-item{display:flex;align-items:center;gap:22px;background:transparent;padding:11px 22px;cursor:pointer;transition:background .12s;border-left:4px solid transparent;border-bottom:1px solid rgba(226,232,240,.65);}
.pf-item:last-child{border-bottom:none;}
.pf-item:hover{background:rgba(43,216,194,.055);}
.pf-item.pf-active{border-left-color:var(--teal);background:rgba(43,216,194,.07);}
.pf-rank{font-size:13px;font-weight:800;color:rgba(0,1,144,.28);font-family:'Poppins',sans-serif;min-width:20px;text-align:center;flex-shrink:0;}
.pf-main{flex:1.6;min-width:0;}
.pf-name{font-size:14.5px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;}
.pf-sym覆{font-size:11px;font-weight:600;color:var(--muted);margin-left:8px;letter-spacing:.04em;}
.pf-sub{font-size:10.5px;color:var(--muted);margin-top:2px;font-family:'Quattrocento Sans',serif;}
.pf-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.pf-bar{height:100%;background:linear-gradient(90deg,var(--navy) 0%,var(--teal) 100%);border-radius:2px;transition:width .5s;}
.pf-metrics{display:flex;gap:28px;flex-shrink:0;}
.pf-metric{text-align:center;min-width:60px;}
.pf-ml{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'Poppins',sans-serif;margin-bottom:5px;white-space:nowrap;}
.pf-mv{font-size:16px;font-weight:900;color:var(--navy);font-family:'Poppins',sans-serif;line-height:1;}
.pf-mv.hi{color:var(--teal-text);}
.pf-col-header{display:flex;align-items:center;gap:22px;padding:0 22px 8px;margin-top:4px;}
.pf-col-name-spacer{flex:1.6;min-width:0;display:flex;align-items:center;gap:4px;text-align:left;font-size:11px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none;transition:color .12s;}
.pf-col-name-spacer:hover{color:var(--teal-text);}
.pf-col-labels{display:flex;gap:28px;flex-shrink:0;}
.pf-col-lbl{min-width:60px;text-align:center;font-size:11px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.07em;}
.pf-col-lbl.pf-col-sortable{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;gap:3px;transition:color .12s;}
.pf-col-lbl.pf-col-sortable:hover{color:var(--teal-text);}
.pf-sort-arrow{font-size:8px;opacity:.75;display:inline-block;min-width:7px;}
.pf-score{text-align:center;min-width:52px;padding:7px 12px;background:rgba(0,1,144,.04);border-radius:9px;flex-shrink:0;}
.pf-score-val{font-size:20px;font-weight:900;color:var(--navy);font-family:'Poppins',sans-serif;line-height:1;}
.pf-score-lbl{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:'Poppins',sans-serif;margin-top:3px;}
.pf-empty{text-align:center;padding:48px;color:var(--muted);font-family:'Quattrocento Sans',serif;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--surface);border-radius:12px;padding:16px 18px;box-shadow:0 2px 14px rgba(0,1,144,.06);border-left:3px solid var(--teal);}
.kpi.gold{border-left-color:var(--gold);}
.kpi.navy{border-left-color:var(--navy);}
.kpi.red{border-left-color:var(--err);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;font-weight:700;}
.kpi-value{font-size:var(--text-2xl);font-weight:800;color:var(--navy);line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:'Quattrocento Sans',serif;}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;font-size:var(--text-base);}
thead th{background:var(--navy);color:#fff;text-align:right;padding:10px 13px;font-weight:600;font-size:12px;letter-spacing:.02em;white-space:nowrap;width:7%;}
thead th:first-child{width:16%;}
thead th:first-child{text-align:left;}
thead th.proj-head{background:var(--navy-light);color:var(--navy);}
tbody td{padding:9px 13px;text-align:right;border-bottom:1px solid rgba(226,232,240,.5);}
tbody td:first-child{text-align:left;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;font-size:11px;}
tbody td.unit{text-align:left;font-size:10px;color:var(--muted);font-style:italic;font-weight:400;font-family:'Quattrocento Sans',serif;}
tbody tr:hover td{background:rgba(43,216,194,.03);}
tbody tr.hist-last td{background:rgba(0,1,144,.03);}
tbody tr.proj-row td{background:var(--proj-bg);color:var(--muted);font-style:italic;}
tbody tr.proj-row td:first-child{font-style:normal;color:var(--navy);opacity:.75;}
tbody td.proj-first{border-left:2px solid var(--teal);}
tbody tr.metric-group-start td{border-top:1px solid rgba(0,1,144,.12);}
tbody tr.proj-sep td{padding:5px 11px;background:linear-gradient(90deg,var(--navy-light),transparent 60%);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);font-family:'Poppins',sans-serif;font-style:normal;}
tbody tr.section-sep td{padding:4px;background:transparent;border:none;}
td input[type=number]{width:100%;border:1px solid transparent;background:transparent;text-align:right;font-size:12px;padding:2px 0;color:inherit;border-radius:4px;font-family:'Quattrocento Sans',serif;transition:border-color .1s,background .1s;-moz-appearance:textfield;}
td input[type=number]::-webkit-outer-spin-button,td input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
td input[type=number]:focus{border-color:var(--teal);background:var(--teal-light);outline:none;}
td input[type=number]:hover{border-color:var(--border);}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.02em;}
.badge-up{background:#dcfce7;color:var(--ok);}
.badge-dn{background:#fee2e2;color:var(--err);}
.badge-nu{background:#f1f5f9;color:#475569;}
.badge-tl{background:var(--teal-light);color:var(--teal-text);}
.badge-gd{background:var(--gold-light);color:var(--gold-text);}
.badge-nv{background:var(--navy-light);color:var(--navy);}

/* ── ALERTS ── */
.alert{padding:9px 13px;border-radius:8px;font-size:11px;margin-bottom:14px;border-left:3px solid;line-height:1.5;}
.alert-warn{background:var(--gold-light);border-color:var(--gold);color:var(--gold-text);}
.alert-info{background:var(--teal-light);border-color:var(--teal);color:var(--teal-text);}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.btn{padding:9px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:transform .1s,box-shadow .1s,opacity .15s;letter-spacing:.02em;}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-light{background:var(--border);color:var(--text);}
.btn-danger{background:#fee2e2;color:#991b1b;}

/* ── CONTROLS ── */
.controls{display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding:12px 18px;background:var(--navy-light);border-radius:10px;margin-bottom:18px;border:1px solid rgba(0,1,144,.08);}
.ctrl{display:flex;align-items:center;gap:8px;}
.ctrl label{font-size:11px;font-weight:700;color:var(--navy);white-space:nowrap;font-family:'Poppins',sans-serif;}
.ctrl input[type=number]{width:90px;border:1px solid rgba(0,1,144,.15);border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;}

/* ── HEADER ANALYSE (nom + ticker + cours) ── */
.analyse-header{display:flex;align-items:center;justify-content:flex-start;flex-wrap:wrap;gap:16px 28px;margin-bottom:18px;}
.analyse-id{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;}
.analyse-name{font-family:'Poppins',sans-serif;font-size:25px;font-weight:800;color:var(--navy);letter-spacing:-.01em;line-height:1.1;}
.analyse-ticker{font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.analyse-price-wrap{display:flex;align-items:center;gap:12px;}
.analyse-price{display:flex;align-items:baseline;gap:3px;}
.analyse-price input#cours{border:none;border-bottom:1.5px solid transparent;background:transparent;font-family:'Poppins',sans-serif;font-size:23px;font-weight:800;color:var(--navy);padding:0 1px 1px;width:112px;text-align:right;transition:border-color .15s;-moz-appearance:textfield;}
.analyse-price input#cours::-webkit-outer-spin-button,.analyse-price input#cours::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.analyse-price input#cours:hover{border-bottom-color:rgba(0,1,144,.18);}
.analyse-price input#cours:focus{outline:none;border-bottom-color:var(--teal);}
.analyse-price-cur{font-size:14px;font-weight:700;color:var(--muted);}

/* ── FORMS ── */
select,input[type=text],input[type=date],textarea{border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;background:#fff;color:var(--text);font-family:'Quattrocento Sans',serif;transition:border-color .1s,box-shadow .1s;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(43,216,194,.15);}
textarea{resize:vertical;width:100%;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-field label{font-size:11px;font-weight:700;color:var(--navy);display:block;margin-bottom:4px;font-family:'Poppins',sans-serif;}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.sep{height:1px;background:var(--border);margin:16px 0;}

/* ── STEP BOX ── */
.step-box{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;}
.step-num{background:var(--navy);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-content{flex:1;}
.step-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;}

/* ── ADJ GRIDS ── */
.adj-eps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0;}
.adj-cell{text-align:center;}
.adj-label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.adj-cell input{width:100%;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 4px;font-size:13px;font-weight:700;font-family:'Quattrocento Sans',serif;}
.metrics-tbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
.metrics-tbl th{text-align:right;padding:5px 8px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
.metrics-tbl th:first-child{text-align:left;}
.metrics-tbl td{padding:4px 6px;text-align:center;}
.metrics-tbl td:first-child{text-align:left;font-weight:700;color:var(--navy);font-size:11px;white-space:nowrap;}
.metrics-tbl td input{width:72px;text-align:center;border:1px solid var(--border);border-radius:5px;padding:4px;font-size:11px;font-family:'Quattrocento Sans',serif;}

/* ── CHARTS ── */
.chart-wrap{position:relative;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* ── ANNUAL CHECKBOX BOX ── */
.annual-box{margin-top:14px;padding:12px 14px;background:var(--gold-light);border-radius:8px;border:1px solid rgba(255,215,0,.4);}
.annual-box label.main-lbl{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;}

/* ── OMNIUM BUTTONS ── */
@keyframes omn-spin{to{transform:rotate(360deg);}}
.omn-ring-active{stroke-dasharray:30 70 !important;transform-origin:center;transform-box:fill-box;animation:omn-spin 1s linear infinite;}
.btn-omn-wrap{display:inline-flex;flex-direction:column;gap:5px;}
.btn-omn-wrap.right{align-items:flex-end;}
.btn-omn-status{font-size:10px;font-weight:700;letter-spacing:.06em;height:13px;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;}
.btn-omn-body{display:flex;align-items:center;border:none;cursor:pointer;padding:0;transition:background .15s,transform .12s,opacity .15s;}
.btn-omn-body:hover:not(:disabled){transform:translateY(-1px);}
.btn-omn-body:disabled{opacity:.6;cursor:not-allowed;transform:none !important;}
.btn-navy{background:linear-gradient(160deg,#0006d8 0%,#000190 55%,#00017e 100%);border-radius:10px;border:1px solid rgba(255,255,255,.13);box-shadow:0 3px 10px rgba(0,1,144,.35),inset 0 1px 0 rgba(255,255,255,.09);}
.btn-navy:hover:not(:disabled){background:linear-gradient(160deg,#0008f0 0%,#0001b0 55%,#000190 100%);}
.btn-teal{background:#2BD8C2;border-radius:11px;}
.btn-teal:hover:not(:disabled){background:#22c9b4;}
.omn-logo-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.omn-ring-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.omn-vsep-white{width:1px;background:rgba(255,255,255,.18);flex-shrink:0;align-self:stretch;}
.omn-vsep-navy{width:1px;background:rgba(0,1,144,.2);flex-shrink:0;align-self:stretch;}

/* ── COLLAPSIBLE ── */
.coll-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;user-select:none;}
.coll-hd span{font-size:11px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.04em;}
.coll-chevron{font-size:10px;color:var(--muted);transition:transform .2s;}
.coll-hd.open .coll-chevron{transform:rotate(180deg);}

/* ── PROJ LABEL PILL ── */
.proj-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:'Poppins',sans-serif;padding:3px 10px;border-radius:10px;background:var(--gold-light);color:var(--gold-text);border:1px solid rgba(255,215,0,.4);}
.proj-pill.cagr{background:var(--teal-light);color:var(--teal-text);border-color:rgba(43,216,194,.4);}

/* ── FISCAL YEAR (exercice décalé) PILL ── */
.fy-pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;font-family:'Poppins',sans-serif;padding:4px 11px;border-radius:10px;background:var(--navy-light);color:var(--navy);border:1px solid rgba(0,1,144,.16);letter-spacing:.02em;}
.fy-pill .fy-dot{width:6px;height:6px;border-radius:50%;background:var(--navy);opacity:.55;flex-shrink:0;}
.fy-month-tag{display:block;font-size:9px;font-weight:600;color:var(--teal-text);opacity:.9;letter-spacing:.03em;margin-top:1px;}
thead th .fy-month-tag{color:#8be9dc;}

/* ── FOOTER ── */
footer{text-align:center;color:var(--muted);font-size:10px;padding:22px;border-top:1px solid var(--border);margin-top:22px;font-family:'Quattrocento Sans',serif;}

@media(max-width:700px){.kpi-grid,.chart-grid,.form-grid{grid-template-columns:1fr 1fr;}.adj-eps-grid{grid-template-columns:repeat(3,1fr);}}

/* pe-row: hidden, P/E drawn on canvas */
.pe-row{display:none;}
/* context bullets */
.ctx-bullet{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(226,232,240,.5);font-size:13px;line-height:1.5;}
.ctx-bullet:last-child{border-bottom:none;}
.ctx-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px;}
.ctx-dot.pos{background:var(--ok);}
.ctx-dot.neg{background:var(--err);}
.ctx-dot.neu{background:var(--muted);}
.ctx-dot.inf{background:var(--teal);}
/* ── PRICE AUTO ── */
.price-auto{font-size:10px;color:var(--muted);font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:4px;}
.price-auto .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
.price-auto .dot.fresh{background:var(--ok);}

<script>
// Mise à l'échelle proportionnelle de l'application selon la largeur d'écran.
// L'app est conçue pour desktop uniquement : plutôt qu'un responsive qui réarrange
// les blocs, on garde EXACTEMENT la même mise en page/proportions et on l'agrandit
// ou la réduit dans son ensemble (comme un zoom navigateur piloté automatiquement),
// pour un rendu propre aussi bien sur un 15" que sur un 29".
(function(){
  var REF_WIDTH = 1440;    // largeur de référence = échelle 100% sur portable 15"
  var CAP_WIDTH = 1920;    // largeur repère d'un écran 23" : au-delà, on n'agrandit plus (marges visibles)
  var MIN_ZOOM = 0.80;
  var MAX_ZOOM = CAP_WIDTH / REF_WIDTH; // ≈ 1.33, plafond atteint dès 23"
  function applyAppZoom(){
    var w = window.innerWidth;
    var z = w / REF_WIDTH;
    if(z < MIN_ZOOM) z = MIN_ZOOM;
    if(z > MAX_ZOOM) z = MAX_ZOOM;
    document.documentElement.style.zoom = z;
  }
  var t;
  window.addEventListener('resize', function(){ clearTimeout(t); t=setTimeout(applyAppZoom,120); });
  applyAppZoom();
  window.__applyAppZoom = applyAppZoom;
})();
</script>

<script>
// DECLARATION DES VARIABLES GLOBALES
let state = { tickers: {} };
let CT = "";

// Abréviations FR des mois, utilisées uniquement pour signaler un exercice
// fiscal décalé (clôture ≠ décembre). Index 1-12, index 0 inutilisé.
const MONTH_ABBR_FR = ['','janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];

// Renvoie le mois de clôture d'exercice du titre (1-12). Absent ou invalide
// => 12 (calendaire standard, comportement inchangé pour tous les titres
// existants qui n'ont pas ce champ).
function fyEndMonth(ticker){
  const d = state.tickers[ticker];
  const m = +d?.fyEndMonth;
  return (m>=1 && m<=12) ? m : 12;
}

// La première année de projection de CHAQUE titre n'est plus déduite de
// l'horloge système, mais de la dernière année réellement présente dans
// son historique "data" (+1). Tant qu'un refresh n'a pas intégré les
// résultats d'un exercice clôturé, rien ne bouge pour ce titre - peu
// importe la date du jour. Chaque titre suit ainsi son propre calendrier
// de publication réel plutôt qu'une règle de date générique.
function yearsFor(ticker){
  const d = state.tickers[ticker];
  const lastHist = (d && d.data && d.data.length) ? d.data[d.data.length-1].year : (new Date().getFullYear()-1);
  const cy = lastHist + 1;
  const py = [cy, cy+1, cy+2, cy+3, cy+4];
  return { CY: cy, PY: py, LY: py[4] };
}

function tickerCur(ticker){
  const sym=(state?.tickers?.[ticker]?.yahooSymbol||'').toUpperCase();
  if(!sym)return '';                            
  if(!sym.includes('.'))return'$';             
  if(sym.endsWith('.MI')||sym.endsWith('.PA')||sym.endsWith('.DE')||
     sym.endsWith('.AS')||sym.endsWith('.MC')||sym.endsWith('.BR')||
     sym.endsWith('.LS')||sym.endsWith('.HE')||sym.endsWith('.CO')||
     sym.endsWith('.ST')||sym.endsWith('.OL'))return'€';
  if(sym.endsWith('.L')||sym.endsWith('.IL'))return'£';
  if(sym.endsWith('.T')||sym.endsWith('.TK'))return'¥';
  if(sym.endsWith('.TO')||sym.endsWith('.V'))return'C$';
  if(sym.endsWith('.AX'))return'A$';
  if(sym.endsWith('.HK'))return'HK$';
  if(sym.endsWith('.SW')||sym.endsWith('.ZH'))return'CHF';
  return'$'; 
}

// Libellé affiché dans la colonne "Next event" de la vue portefeuille.
// Convention COURTE et anglo-saxonne (annee sur 2 chiffres, mois abrege
// anglais) : { label: "Q3 26" | "Q3 FY 27" | "H1 26" | "CMD" | tout libelle
// court, date: "2026-10-23" | null }
// - label seul si la date n'est pas encore annoncée : ex. "Q3 26".
// - label + date des qu'elle est connue/annoncee : ex. "Q3 26 - Oct 23".
// - permet aussi un evenement alternatif important (Capital Markets Day,
//   Investor Day, etc.) via un label libre au lieu d'un trimestre.
//
// DOUBLE STOCKAGE AVEC PRIORITE (choix delibere, voir INSTRUCTIONS.md) :
// - source prioritaire : data/nextEvents.json (fichier dedie, optionnel,
//   charge dans state.nextEvents par loadState()), alimente UNIQUEMENT par
//   une mise a jour groupee (Operation C). Rafraichi en un seul fichier,
//   donc facile a relancer regulierement (ex. toutes les deux semaines).
// - fallback : le champ nextEvent du JSON du titre lui-meme, ecrit a la
//   creation/au refresh (Operations A/B). Utilise UNIQUEMENT si le ticker
//   est absent de state.nextEvents (titre pas encore couvert par un C).
// Cette priorite volontaire accepte une petite fenetre d'incoherence entre
// deux passages de l'Operation C, en echange d'une mise a jour groupee en
// un seul fichier, plutot qu'un double-fetch systematique par titre.
function nextEventLabel(ticker){
  const d=state.tickers[ticker];
  const ne=(state.nextEvents&&state.nextEvents[ticker])||d?.nextEvent;
  if(!ne || !ne.label) return '—';
  if(!ne.date) return ne.label;
  const dt=new Date(ne.date);
  if(isNaN(dt)) return ne.label;
  const formatted=dt.toLocaleDateString('en-US',{day:'numeric',month:'short'});
  return `${ne.label} - ${formatted}`;
}
// Valeur brute (timestamp) du prochain evenement, pour le tri chronologique
// de la colonne "Next event". Retourne null si aucune date confirmee n'est
// disponible (evenement absent, label sans date, ou date invalide) - ces
// titres sont alors relegues en fin de liste quel que soit le sens du tri.
function nextEventDate(ticker){
  const d=state.tickers[ticker];
  const ne=(state.nextEvents&&state.nextEvents[ticker])||d?.nextEvent;
  if(!ne || !ne.date) return null;
  const dt=new Date(ne.date);
  return isNaN(dt) ? null : dt.getTime();
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x+y,r);
    this.arcTo(x,y,x+r,y,r);this.closePath();return this;
  };
}

function normalizeTicker(key,d){
  if(!d.particularites)d.particularites=[];
  if(!d.nextEvent)d.nextEvent=null;
  return d;
}

function normalizeState(s){
  if(!s.tickers)s.tickers={};
  if(!s.nextEvents)s.nextEvents={};
  Object.keys(s.tickers).forEach(key=>normalizeTicker(key,s.tickers[key]));
  return s;
}

function fingerprint(str){
  let h=5381;
  for(let i=0;i<str.length;i++){h=((h*33)^str.charCodeAt(i))>>>0;}
  return h.toString(16).padStart(8,'0');
}

async function loadState() {
  try {
    // 1. Charge le manifeste : la liste des codes de titres a charger.
    const manRes = await fetch('data/manifest.json');
    if (!manRes.ok) throw new Error(`data/manifest.json introuvable: ${manRes.status}`);
    const manifest = await manRes.json();
    const codes = manifest.tickers || [];

    // 2. Charge chaque fichier de titre en parallele. Un fichier manquant ou
    //    invalide ne bloque PAS les autres : il est juste ignore avec un
    //    avertissement, pour qu'une erreur sur un seul titre n'empeche pas
    //    l'affichage de tout le portefeuille (c'est tout le sens du
    //    decoupage par fichier).
    // 2bis. En parallele, charge aussi data/nextEvents.json : fichier dedie
    //    et OPTIONNEL (source prioritaire pour la colonne "Next event",
    //    alimente uniquement par une mise a jour groupee -
    //    Operation C). Son absence ou son invalidite est silencieuse : elle
    //    ne doit jamais bloquer le chargement, chaque titre retombe alors
    //    sur son propre champ nextEvent (voir nextEventLabel()).
    const [results, nextEvents] = await Promise.all([
      Promise.all(codes.map(async code => {
        try {
          const r = await fetch(`data/${code}.json`);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const obj = await r.json();
          return [code, obj];
        } catch (e) {
          console.error(`loadState: data/${code}.json illisible -`, e);
          showToast(`⚠ Titre ${code} illisible (data/${code}.json) - ignore.`, 6000);
          return null;
        }
      })),
      fetch('data/nextEvents.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
    ]);

    const tickers = {};
    results.forEach(pair => { if (pair) tickers[pair[0]] = pair[1]; });
    const jsonData = { tickers, nextEvents: nextEvents || {} };

    // Empreinte calculee sur l'ensemble reconstitue, pour rester comparable
    // a l'ancien comportement (verification de coherence entre onglets).
    const fp = fingerprint(JSON.stringify(jsonData));
    const elFp = document.getElementById('data-fingerprint');
    if (elFp) elFp.textContent = fp;

    return normalizeState(jsonData);
  } catch (e) {
    console.error('loadState:', e);
    showToast('⚠ Impossible de charger data/manifest.json. Verifiez sa presence.', 8000);
    return normalizeState({tickers:{}});
  }
}

function cagr(arr){
  let i0=-1,i1=-1;
  arr.forEach((v,i)=>{if(v>0){if(i0<0)i0=i;i1=i;}});
  if(i0<0||i1<=i0)return 0;
  return Math.pow(arr[i1]/arr[i0],1/(i1-i0))-1;
}

function particulariteYieldPct(d){
  return (d.particularites||[]).filter(p=>p.valuePct!==null&&p.valuePct!==undefined&&p.valuePct!=='').reduce((s,p)=>s+(+p.valuePct||0),0);
}

function getProj(ticker){
  const d=state.tickers[ticker];
  if(!d || !d.data || d.data.length === 0) return {proj:{}, date:null, evtName:null};
  const ca=d.data.map(r=>r.ca),eb=d.data.map(r=>r.ebit),
        nt=d.data.map(r=>r.net),nd=d.data.map(r=>r.nd),sh=d.data.map(r=>r.shares);
  const ly=d.data[d.data.length-1].year;
  const PY=[ly+1,ly+2,ly+3,ly+4,ly+5]; // propre à CE titre, voir yearsFor()
  const lastCA=ca[ca.length-1],lastEB=eb[eb.length-1],
        lastNT=nt[nt.length-1],lastND=nd[nd.length-1],lastSH=sh[sh.length-1];
  const st=a=>{const s=cagr(a.slice(-3));return s||cagr(a);};
  const cCA_st=st(ca),cEB_st=st(eb),cNT_st=st(nt); 
  const cCA_lt=cagr(ca),cEB_lt=cagr(eb),cNT_lt=cagr(nt),cND_lt=cagr(nd);
  const grow=(last,h,rst,rlt)=>h<=2?last*Math.pow(1+rst,h):last*Math.pow(1+rst,2)*Math.pow(1+rlt,h-2);
  const cSH = sh.filter(v=>v>0).length>=2 ? cagr(sh) : 0;
  const base={};
  PY.forEach(y=>{
    const h=y-ly;
    const projShares=Math.max(1, lastSH*Math.pow(1+cSH,h));
    const projNet=grow(lastNT,h,cNT_st,cNT_lt);
    base[y]={
      eps:projNet/projShares,
      ca:grow(lastCA,h,cCA_st,cCA_lt),
      ebit:grow(lastEB,h,cEB_st,cEB_lt),
      net:projNet,
      nd:grow(lastND,h,cND_lt,cND_lt),
      shares:projShares
    };
  });
  const hyp=d.hypothese;
  const hasAdj=hyp&&['adjEPS','adjCA','adjEBIT','adjNet','adjND','adjShares'].some(k=>hyp[k]&&Object.values(hyp[k]).some(v=>v!=null&&v!==''));
  if(!hasAdj)return{proj:base,date:null,evtName:null};
  const out={};
  PY.forEach(y=>{ out[y]={...base[y]}; });
  const has=(o,y)=>o&&o[y]!=null&&o[y]!=='';
  PY.forEach(y=>{
    if(has(hyp.adjCA,y))     out[y].ca    =+hyp.adjCA[y];
    if(has(hyp.adjEBIT,y))   out[y].ebit  =+hyp.adjEBIT[y];
    if(has(hyp.adjNet,y))    out[y].net   =+hyp.adjNet[y];
    if(has(hyp.adjND,y))     out[y].nd    =+hyp.adjND[y];
    if(has(hyp.adjShares,y)) out[y].shares=+hyp.adjShares[y];
    if(has(hyp.adjEPS,y))    out[y].eps   =+hyp.adjEPS[y];
    else if((has(hyp.adjNet,y)||has(hyp.adjShares,y))&&out[y].shares>0)
      out[y].eps=out[y].net/out[y].shares;
  });
  return{proj:out,date:hyp.date,evtName:hyp.source||null};
}

function checkEpsCoherence(d){
  const hyp=d&&d.hypothese;
  if(!hyp)return [];
  const bad=[];
  Object.keys(hyp.adjEPS||{}).forEach(y=>{
    const eps=+hyp.adjEPS[y],net=+(hyp.adjNet?.[y]),sh=+(hyp.adjShares?.[y]);
    if(!eps||!net||!sh)return;
    const implied=net/sh;
    if(Math.abs(eps-implied)/Math.abs(implied)>0.02)
      bad.push({y,eps,implied});
  });
  return bad;
}

    const d=state.tickers[tk];
    if(!d||!(d.yahooSymbol||'').trim())return false;
    return !(d._priceCache&&(now-d._priceCache.ts)<PRICE_TTL);
  });
  if(!keys.length)return;
  _refreshAllInFlight=true;
  // Plusieurs requetes de prix en parallele (au lieu d'une file avec 350ms
  // d'attente entre chaque titre) : le portefeuille affiche des cours a jour
  // en quelques secondes au lieu de defiler titre par titre.
  const CONCURRENCY=6;
  let i=0;
  const worker=async()=>{
    while(i<keys.length){
      const tk=keys[i++];
      try{ await autoFetchPrice(tk,false); }catch(e){}
    }
  };
  Promise.all(Array.from({length:CONCURRENCY},worker)).finally(()=>{_refreshAllInFlight=false;});
}

const GOOGLE_FINANCE_URL='https://script.google.com/macros/s/AKfycbzlc2mqM71rf_zTMC7_wALi9VZEkHdOx9-VGlm8OE4vjZwM7wFh-7bVZH72JG_r_FdNwA/exec';
// Proxy Yahoo Finance côté serveur (PHP, hébergé chez toi) - remplace la
// chaîne de proxys CORS publics utilisée précédemment. A adapter avec ton
// propre domaine une fois price.php déposé par FTP.
const YAHOO_PROXY_URL='https://model.omnium-capital.com/price.php';
const _fetchInFlight={}; 

function _priceIsPlausible(p,ref,liveConfirmed){
  if(!Number.isFinite(p)||p<=0)return false;
  // Le "cours" venant du JSON n'est qu'une valeur de secours (jamais
  // réécrite sur GitHub après un fetch live - voir saveState()). Tant
  // qu'aucun prix live n'a été confirmé dans CETTE session, on ne doit
  // pas s'en servir comme borne : un cours de secours obsolète ou faux
  // bloquerait alors indéfiniment toute correction (le filtre se
  // compare toujours à la dernière valeur connue, qui resterait la
  // valeur fausse puisqu'elle ne serait jamais remplacée). Seul un prix
  // déjà confirmé en live sert de garde-fou contre un vrai bug d'API.
  if(liveConfirmed && ref>0 && (p>ref*4 || p<ref/4))return false;
  return true;
}

async function fetchFromGoogleFinance(sym){
  try{
    const r=await fetch(GOOGLE_FINANCE_URL+'?ticker='+encodeURIComponent(sym),{signal:AbortSignal.timeout(12000)});
    if(!r.ok)return null;
    const j=await r.json();
    const price=+j?.price;
    return(price&&price>0)?price:null;
  }catch(e){return null;}
}

async function _fetchFromYahoo(sym){
  try{
    const r=await fetch(YAHOO_PROXY_URL+'?ticker='+encodeURIComponent(sym),{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const j=await r.json();
    if(!j||!j.price)return null;
    return{price:+j.price, div:(j.div!=null?+j.div:null)};
  }catch(e){ return null; }
}

async function autoFetchPrice(ticker,force){
  const d=state.tickers[ticker];
  if(!d||!(d.yahooSymbol||'').trim())return;
  updatePriceDot(d._priceUpdatedAt||d._lastFetchAttemptAt||null,true);
  if(!force && d._priceCache && (Date.now()-d._priceCache.ts)<PRICE_TTL){
    updatePriceDot(d._priceUpdatedAt||d._lastFetchAttemptAt||null,false);
    return;
  }
  if(_fetchInFlight[ticker])return;
  _fetchInFlight[ticker]=true;
  const sym=(d.yahooSymbol||'').trim();
  const ref=+d.cours||0;
  const liveConfirmed=!!d._liveConfirmed;
  let finalPrice=null, finalDiv=null, source='';
  try{
    const gf=await fetchFromGoogleFinance(sym);
    if(_priceIsPlausible(gf,ref,liveConfirmed)){ finalPrice=gf; source='google'; }
    if(finalPrice===null){
      const y=await _fetchFromYahoo(sym);
      if(y && _priceIsPlausible(y.price,ref,liveConfirmed)){ finalPrice=y.price; finalDiv=y.div; source='yahoo'; }
    }
  }catch(e){}
  d._lastFetchAttemptAt=Date.now();
  if(finalPrice!==null){
    d.cours=+finalPrice.toFixed(2);
    d._liveConfirmed=true;
    d._priceCache={price:d.cours,ts:Date.now()};
    d._priceUpdatedAt=Date.now();
    d._priceSource=source;
    if(finalDiv!==null && finalDiv>=0){
      d.dividende=+(+finalDiv).toFixed(4);
    }
    updatePriceDot(d._priceUpdatedAt,false);
    // Mise a jour ciblee : pas de renderAnalyse() complet ici, pour ne pas
    // recreer le graphe EPS (effet de "saut" visuel) ni refermer le panneau
    // "Hypothese actuelle" que l'utilisateur est peut-etre en train de lire.
    refreshPriceOnly(ticker);
    renderPortfolio();
  } else {
    updatePriceDot(d._priceUpdatedAt||d._lastFetchAttemptAt,true);
  }
  _fetchInFlight[ticker]=false;
}

// Dessine la ligne de multiples P/E sous le graphe EPS a partir des metadonnees
// deja calculees par Chart.js (chart.getDatasetMeta). Independant du cours :
// peut etre rappele a tout moment (rafraichissement de prix) SANS recreer le
// graphe ni provoquer une animation/re-render visible.
function drawPERow(chart,opts){
  const el=document.getElementById('pe-row');
  if(!el||!chart||!opts)return;
  const {n,cours}=opts;
  el.innerHTML='';
  el.style.cssText='position:relative;height:44px;margin-top:8px;';
  const meta=chart.getDatasetMeta(1);
  const ca=chart.chartArea;
  const lbl=document.createElement('span');
  lbl.textContent='P/E';
  lbl.style.cssText=`position:absolute;left:0;top:50%;transform:translateY(-50%);font-size:14px;font-weight:800;letter-spacing:.06em;color:var(--navy);font-family:'Poppins',sans-serif;opacity:.75;`;
  el.appendChild(lbl);
  const firstPt=meta.data[n];
  if(firstPt){
    const lineEnd=firstPt.x-28;
    const line=document.createElement('div');
    line.style.cssText=`position:absolute;left:${ca.left}px;width:${Math.max(0,lineEnd-ca.left)}px;top:50%;border-top:1px dashed rgba(0,1,144,.15);pointer-events:none;`;
    el.appendChild(line);
  }
  meta.data.forEach((pt,i)=>{
    if(i<n)return;
    const val=chart.data.datasets[1].data[i];
    if(!val)return;
    const pe=cours/val;
    const span=document.createElement('span');
    span.textContent=pe.toFixed(1)+'×';
    span.style.cssText=`position:absolute;left:${pt.x}px;transform:translateX(-50%);top:50%;margin-top:-14px;font-size:16px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;background:rgba(0,1,144,.08);padding:4px 12px;border-radius:6px;white-space:nowrap;`;
    el.appendChild(span);
  });
}

// Formatte un montant en millions vers un affichage compact "X,XX Md" ou "X M"
// (pas de decimales inutiles en dessous de 10). Purement cosmetique.
function fmtBigNum(v){
  if(v===null||v===undefined||v==='')return null;
  const n=+v; if(!isFinite(n))return null;
  return Math.abs(n)>=1000 ? (n/1000).toFixed(2).replace(/\.00$/,'')+' Md' : n.toFixed(n<10&&n!==0?2:0)+' M';
}
function fmtPctDelta(actual,consensus){
  if(actual==null||consensus==null||consensus===0||!isFinite(+actual)||!isFinite(+consensus))return null;
  return ((+actual-+consensus)/Math.abs(+consensus))*100;
}
function pctBadge(delta){
  if(delta===null)return '';
  const col=delta>=0?'var(--teal-text)':'#e05252';
  const bg=delta>=0?'rgba(43,216,194,.14)':'rgba(224,82,82,.1)';
  return `<span style="font-size:10.5px;font-weight:800;font-family:'Poppins',sans-serif;color:${col};background:${bg};border-radius:5px;padding:1px 6px;white-space:nowrap;">${delta>=0?'+':''}${delta.toFixed(1)}%</span>`;
}

// Bloc "dernier trimestre publie" (resultats vs consensus, guidance, points cles
// du call) - voir hypothese.dernierCall dans INSTRUCTIONS.md. Affiche juste sous
// la ligne date/source, AVANT le resume/texte de la these (ne s'y substitue pas).
function renderDernierCall(dc, ticker){
  if(!dc)return '';
  const cur=tickerCur(ticker)||'€';
  const q=(dc.quarter||'').trim();
  const ca=dc.resultatsVsConsensus?.ca||null;
  const eps=dc.resultatsVsConsensus?.epsAdj||null;
  const caActual=ca&&ca.actual!=null?fmtBigNum(ca.actual):null;
  const caCons=ca&&ca.consensus!=null?fmtBigNum(ca.consensus):null;
  const caDelta=ca?fmtPctDelta(ca.actual,ca.consensus):null;
  const epsDelta=eps?fmtPctDelta(eps.actual,eps.consensus):null;

  const caLine=caActual?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;">
      <span style="font-size:10.5px;color:var(--muted);font-family:'Poppins',sans-serif;font-weight:700;">CA</span>
      <span style="font-size:13px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;">${caActual}${cur}</span>
      ${caCons?`<span style="font-size:10.5px;color:var(--muted);font-family:'Poppins',sans-serif;">cons. ${caCons}${cur}</span>`:''}
      ${pctBadge(caDelta)}
    </div>`:'';
  const epsLine=(eps&&eps.actual!=null)?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;">
      <span style="font-size:10.5px;color:var(--muted);font-family:'Poppins',sans-serif;font-weight:700;">EPS${eps.basis?' ('+eps.basis+')':''}</span>
      <span style="font-size:13px;font-weight:800;color:var(--navy);font-family:'Poppins',sans-serif;">${(+eps.actual).toFixed(2)}${cur}</span>
      ${eps.consensus!=null?`<span style="font-size:10.5px;color:var(--muted);font-family:'Poppins',sans-serif;">cons. ${(+eps.consensus).toFixed(2)}${cur}</span>`:''}
      ${pctBadge(epsDelta)}
    </div>`:'';
  const resultsBlock=(caLine||epsLine)?`<div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.05em;">Résultats${q?' '+q:''} vs consensus</div>
      ${caLine}${epsLine}
    </div>`:'';

  const esc=s=>(s||'').toString().replace(/</g,'&lt;');
  const guidQ=dc.guidanceProchainTrimestre?`<div style="margin-top:8px;">
      <div style="font-size:10px;font-weight:700;color:var(--muted);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.05em;">Guidance prochain trimestre</div>
      <div style="font-size:12px;color:var(--text);line-height:1.5;margin-top:1px;">${esc(dc.guidanceProchainTrimestre)}</div>
    </div>`:'';
  const guidFY=dc.guidanceAnnuelle?`<div style="margin-top:8px;">
      <div style="font-size:10px;font-weight:700;color:var(--muted);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.05em;">Guidance annuelle</div>
      <div style="font-size:12px;color:var(--text);line-height:1.5;margin-top:1px;">${esc(dc.guidanceAnnuelle)}</div>
    </div>`:'';
  const points=(dc.pointsCles||[]).filter(Boolean);
  const pointsBlock=points.length?`<div style="margin-top:8px;">
      <div style="font-size:10px;font-weight:700;color:var(--muted);font-family:'Poppins',sans-serif;text-transform:uppercase;letter-spacing:.05em;">Points clés du call</div>
      ${points.map(p=>`<div style="font-size:12px;color:var(--text);line-height:1.5;margin-top:1px;">• ${esc(p)}</div>`).join('')}
    </div>`:'';

  if(!resultsBlock&&!guidQ&&!guidFY&&!pointsBlock)return '';
  return `<div style="margin-top:6px;padding:9px 12px;background:rgba(0,1,144,.03);border:1px solid rgba(0,1,144,.1);border-radius:8px;">
    ${resultsBlock}${guidQ}${guidFY}${pointsBlock}
  </div>`;
}

function calcScore(ticker){
  const d=state.tickers[ticker];
  if(!d||!d.data||d.data.length<2)return 0;
  const cours=d.cours||100;
  const{proj}=getProj(ticker);
  const {CY,LY}=yearsFor(ticker);
  const epsCY=proj[CY]?.eps||0,eps30=proj[LY]?.eps||0;
  if(epsCY<=0||eps30<=0)return 0;
  const cagrEps=((Math.pow(eps30/epsCY,0.25))-1)*100;
  const div=d.dividende||0;
  const yieldPct=(cours>0&&div>0?(div/cours)*100:0)+particulariteYieldPct(d);
  const peFwd=cours>0?cours/epsCY:null;
  if(!peFwd||peFwd<=0)return 0;
  return (cagrEps+yieldPct)/peFwd;
}

// Tri de la vue portefeuille. Défaut = classement d'origine (score CAGR+yield / PE), inchangé.
let pfSort={key:'score',dir:'desc'};
function pfSortBy(key){
  if(pfSort.key===key){ pfSort.dir = pfSort.dir==='asc'?'desc':'asc'; }
  else{ pfSort.key=key; pfSort.dir = (key==='name'||key==='nextEvent'||key==='peN'||key==='peN1')?'asc':'desc'; }
  renderPortfolio();
}
function pfSortItems(items){
  const{key,dir}=pfSort;
  const mul=dir==='asc'?1:-1;
  return items.slice().sort((a,b)=>{
    if(key==='name'){
      return mul*(a.d.name||a.tk).localeCompare(b.d.name||b.tk,'fr',{sensitivity:'base'});
    }
    if(key==='nextEvent'){
      const av=a.nextEvtDate, bv=b.nextEvtDate;
      if(av==null&&bv==null)return 0;
      if(av==null)return 1;   // pas de date confirmee -> toujours en fin de liste
      if(bv==null)return -1;
      return mul*(av-bv);
    }
    let av,bv;
    switch(key){
      case 'return': av=a.totalReturn; bv=b.totalReturn; break;
      case 'peN': av=a.peFwd??Infinity; bv=b.peFwd??Infinity; break;
      case 'peN1': av=a.pe27??Infinity; bv=b.pe27??Infinity; break;
      default: av=a.score; bv=b.score;
    }
    return mul*(av-bv);
  });
}
function pfUpdateSortHeaderUI(){
  document.querySelectorAll('.pf-sort-arrow').forEach(el=>{
    const k=el.getAttribute('data-key');
    el.textContent=(pfSort.key===k)?(pfSort.dir==='asc'?'▲':'▼'):'';
  });
}

function renderPortfolio(){
  const list=document.getElementById('pf-list');
  const countEl=document.getElementById('pf-count');
  if(!list)return;list.innerHTML='';
  
  const items=Object.entries(state.tickers)
    .filter(([,d])=>d.data&&d.data.length>=2)
    .map(([tk,d])=>{
      try{
        const cours=d.cours||100;
        const{proj}=getProj(tk);
        const {CY,LY}=yearsFor(tk);
        const div=d.dividende||0;
        const epsCY=proj[CY]?.eps||0,eps27=proj[CY+1]?.eps||0,eps30=proj[LY]?.eps||0;
        const cagrEps=(epsCY>0&&eps30>0)?((Math.pow(eps30/epsCY,0.25))-1)*100:0;
        const yieldPct=((cours>0&&div>0)?(div/cours)*100:0)+particulariteYieldPct(d);
        const totalReturn=cagrEps+yieldPct;
        const peFwd=(cours>0&&epsCY>0)?cours/epsCY:null;
        const pe27=(cours>0&&eps27>0)?cours/eps27:null;
        const score=calcScore(tk);
        const nextEvt=nextEventLabel(tk);
        const nextEvtDate=nextEventDate(tk);
        return{tk,d,cours,totalReturn,peFwd,pe27,score,nextEvt,nextEvtDate};
      }catch(e){return null;}
    }).filter(Boolean);

  if(countEl)countEl.textContent=items.length+' titre'+(items.length!==1?'s':'');
  
  const hdr=document.getElementById('pf-col-header');
  if(hdr) hdr.style.display = items.length ? 'flex' : 'none';

  if(!items.length){
    list.innerHTML='<div class="pf-empty">Aucun titre. database.json est peut-être vide ou non configuré.</div>';
    return;
  }
  
  const maxScore=Math.max(...items.map(x=>x.score),0.1);
  const sorted=pfSortItems(items);
  sorted.forEach(({tk,d,cours,totalReturn,peFwd,pe27,score,nextEvt},idx)=>{
    const el=document.createElement('div');
    el.className='pf-item'+(tk===CT?' pf-active':'');
    el.onclick=()=>{CT=tk;refreshSelects();document.getElementById('cours').value=cours;syncAnalyseHeader(tk);showTab('analyse',null);autoFetchPrice(tk,true);};
    const barW=Math.round(score/maxScore*100);
    
    el.innerHTML=`
      <div class="pf-rank">${idx+1}</div>
      <div class="pf-main">
       <div class="pf-name">${d.name||tk}</div>
        <div class="pf-bar-wrap"><div class="pf-bar" style="width:${barW}%"></div></div>
      </div>
      <div class="pf-metrics">
        <div class="pf-metric" style="flex:0 0 100px;"><div class="pf-mv${totalReturn!=='—'&&parseFloat(totalReturn)>=8?' hi':''}">${totalReturn>=0?'+':''}${totalReturn.toFixed(1)}%</div></div>
        <div class="pf-metric" style="flex:0 0 70px;"><div class="pf-mv">${peFwd?peFwd.toFixed(1)+'×':'—'}</div></div>
        <div class="pf-metric" style="flex:0 0 70px;"><div class="pf-mv">${pe27?pe27.toFixed(1)+'×':'—'}</div></div>
        <div class="pf-metric" style="flex:0 0 132px;"><div class="pf-mv" style="font-size:12.5px;">${nextEvt}</div></div>
      </div>
    `;
    list.appendChild(el);
  });
  pfUpdateSortHeaderUI();
}
